<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shark AI Hackathon — May 26, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Fraunces:ital,wght@1,400;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0A0A0A;--white:#fff;--off:#F5F5F0;
  --cyan:#19D3E0;--cyan-d:#0FB8C4;
  --gray:#6B7280;--gray-lt:#E5E7EB;--gray-mid:#9CA3AF;
  --fd:"Space Grotesk",sans-serif;
  --fm:"JetBrains Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#fff;color:var(--black);font-family:var(--fd);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}button{font-family:var(--fd);cursor:pointer;border:none}
::selection{background:var(--cyan);color:var(--black)}img{display:block;max-width:100%}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:2px solid var(--black);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,4vw,60px);height:64px;transition:box-shadow .2s}
.nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.08)}
.nav__logo img{height:36px;width:auto}
.nav__links{display:flex;gap:32px;font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.nav__links a{transition:color .15s}.nav__links a:hover{color:var(--cyan-d)}
.nav__cta{background:var(--black);color:#fff;padding:11px 22px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:background .15s}
.nav__cta:hover{background:var(--cyan);color:var(--black)}
@media(max-width:860px){.nav__links{display:none}}

/* HERO */
.hero{padding:64px clamp(20px,4vw,60px) 0;background:#fff}
.hero__inner{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,4vw,80px);align-items:center;padding:60px 0 80px}
@media(max-width:900px){.hero__inner{grid-template-columns:1fr}}
.hero__kicker{display:inline-flex;align-items:center;gap:10px;background:var(--black);color:#fff;padding:8px 16px;font-family:var(--fm);font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:28px}
.hero__kicker span{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 1.8s ease-in-out infinite;flex-shrink:0}
.hero__hl{font-size:clamp(3rem,6.5vw,6.5rem);font-weight:800;line-height:.95;letter-spacing:-.03em;text-transform:uppercase;margin-bottom:28px}
.hero__hl em{font-style:italic;color:var(--cyan);font-family:"Fraunces",serif;text-transform:none;display:block;font-size:.72em;line-height:1.1;letter-spacing:-.01em}
.hero__sub{font-size:clamp(1rem,1.3vw,1.15rem);line-height:1.58;color:#374151;margin-bottom:32px;max-width:520px;font-weight:500}
.hero__cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:48px}
.btn-primary{background:var(--black);color:#fff;padding:16px 32px;font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:background .15s,transform .15s;display:inline-flex;align-items:center;gap:10px}
.btn-primary:hover{background:var(--cyan);color:var(--black);transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--black);padding:15px 26px;font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:2px solid var(--black);transition:all .15s;display:inline-flex;align-items:center;gap:10px}
.btn-outline:hover{background:var(--black);color:#fff}
.hero__stats{display:grid;grid-template-columns:repeat(3,1fr);border:2px solid var(--black)}
.hero__stat{padding:20px;border-right:2px solid var(--black);text-align:center}
.hero__stat:last-child{border-right:0}
.hero__stat strong{display:block;font-size:clamp(1.8rem,2.8vw,2.5rem);font-weight:800;letter-spacing:-.02em;font-family:var(--fm)}
.hero__stat span{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gray)}
.flyer-wrap{position:relative;border:3px solid var(--black);box-shadow:8px 8px 0 var(--black)}
.flyer-wrap img{width:100%;display:block}
.flyer-tag{position:absolute;top:-16px;right:20px;background:var(--cyan);color:var(--black);font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.16em;padding:7px 14px;text-transform:uppercase;border:2px solid var(--black)}

/* MARQUEE */
.marquee-strip{background:var(--black);padding:16px 0;overflow:hidden;border-top:2px solid var(--black);border-bottom:2px solid var(--black);white-space:nowrap}
.marquee-track{display:inline-flex;animation:marquee 22s linear infinite}
.marquee-item{display:inline-flex;align-items:center;gap:16px;padding:0 28px;font-family:var(--fm);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#fff}
.marquee-dot{color:var(--cyan);font-size:16px}

/* COUNTDOWN BAR */
.cdbar{background:var(--black);padding:clamp(32px,4vw,52px) clamp(20px,4vw,60px)}
.cdbar__inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap}
.cdbar__lbl{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}
.cdbar__title{font-size:clamp(1.1rem,2vw,1.5rem);font-weight:800;text-transform:uppercase;letter-spacing:-.01em;color:#fff}
.countdown{display:flex;align-items:flex-end;gap:5px}
.cunit{display:flex;flex-direction:column;align-items:center;gap:5px}
.cdigits{display:flex;gap:3px;font-family:var(--fm);font-size:clamp(26px,4vw,42px);font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.cdigits span{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:5px 9px;min-width:1ch;text-align:center}
.clbl{font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:.2em;color:rgba(255,255,255,.3);text-transform:uppercase}
.csep{font-family:var(--fm);font-size:clamp(22px,3vw,34px);color:var(--cyan);padding-bottom:20px;font-weight:700;animation:blink 1s steps(2) infinite}

/* SECTIONS */
.sec{padding:clamp(60px,8vw,110px) clamp(20px,4vw,60px)}
.sec--dark{background:var(--black);color:#fff}
.sec--gray{background:var(--off)}
.wrap{max-width:1300px;margin:0 auto}
.sh{margin-bottom:clamp(36px,4vw,56px)}
.sh__num{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);margin-bottom:12px;display:flex;align-items:center;gap:12px}
.sh__num::after{content:"";flex:1;height:1px;background:var(--gray-lt)}
.sec--dark .sh__num{color:var(--gray-mid)}.sec--dark .sh__num::after{background:rgba(255,255,255,.12)}
.sh__title{font-size:clamp(2.4rem,4.8vw,4.8rem);font-weight:800;letter-spacing:-.03em;text-transform:uppercase;line-height:.95}
.sh__title em{font-style:italic;color:var(--cyan);font-family:"Fraunces",serif;text-transform:none}
.sh__sub{font-size:16px;color:var(--gray);margin-top:16px;max-width:580px;line-height:1.6;font-weight:500}
.sec--dark .sh__sub{color:var(--gray-mid)}

/* EXPERIENCE */
.exp-grid{display:grid;grid-template-columns:repeat(2,1fr);border:2px solid rgba(255,255,255,.12)}
@media(max-width:700px){.exp-grid{grid-template-columns:1fr}}
.exp-card{padding:clamp(28px,3vw,44px);border-bottom:2px solid rgba(255,255,255,.08);border-right:2px solid rgba(255,255,255,.08);position:relative;transition:background .2s;cursor:default}
.exp-card:nth-child(2n){border-right:0}
.exp-card:nth-child(n+3){border-bottom:0}
.exp-card:hover{background:rgba(25,211,224,.05)}
.exp-num{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.18em;color:rgba(255,255,255,.25);margin-bottom:20px}
.exp-icon{color:var(--cyan);margin-bottom:18px}
.exp-title{font-size:clamp(1.05rem,1.8vw,1.35rem);font-weight:800;letter-spacing:.02em;text-transform:uppercase;margin-bottom:10px;color:#fff}
.exp-body{font-size:13.5px;color:rgba(255,255,255,.55);line-height:1.62}
.exp-live{position:absolute;top:clamp(20px,2vw,32px);right:clamp(20px,2vw,32px);background:var(--cyan);color:var(--black);font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:.16em;padding:5px 10px;text-transform:uppercase}

/* ACCESS CARDS */
.access-grid{display:grid;grid-template-columns:repeat(3,1fr);border:2px solid var(--black)}
@media(max-width:860px){.access-grid{grid-template-columns:1fr}}
.ac-card{padding:clamp(24px,3vw,40px);border-right:2px solid var(--black);cursor:pointer;transition:background .18s;position:relative;background:none;text-align:left;width:100%;border-bottom:none}
.ac-card:last-child{border-right:0}
@media(max-width:860px){.ac-card{border-right:0;border-bottom:2px solid var(--black)}.ac-card:last-child{border-bottom:0}}
.ac-card:hover{background:var(--off)}
.ac-card.active{background:var(--black);color:#fff}
.ac-card.active .ac-body{color:rgba(255,255,255,.6)}
.ac-card.active .ac-sub{color:rgba(255,255,255,.4)}
.ac-card.active .ac-seats{color:var(--cyan)}
.ac-tag{display:inline-block;font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;padding:4px 10px;border:1.5px solid var(--black);margin-bottom:16px}
.ac-card.active .ac-tag{border-color:var(--cyan);color:var(--cyan)}
.ac-label{font-size:clamp(1.2rem,2vw,1.7rem);font-weight:800;letter-spacing:.03em;text-transform:uppercase;margin-bottom:4px}
.ac-sub{font-family:var(--fm);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);margin-bottom:14px}
.ac-body{font-size:13.5px;color:#374151;line-height:1.6;margin-bottom:16px}
.ac-seats{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--gray);display:flex;align-items:center;gap:8px}
.ac-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);flex-shrink:0}

/* FORM */
.form-wrap{border:2px solid var(--black);border-top:0;padding:clamp(24px,3vw,44px)}
.form-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;padding-bottom:20px;border-bottom:2px solid var(--gray-lt);gap:16px;flex-wrap:wrap}
.form-step{font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan-d);margin-bottom:4px}
.form-title{font-size:20px;font-weight:800;letter-spacing:-.01em}
.form-applying{font-family:var(--fm);font-size:12px;font-weight:600;letter-spacing:.1em;padding:8px 16px;border:2px solid var(--black);text-transform:uppercase}
.form-applying strong{color:var(--cyan-d)}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px 20px}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:7px}
.field-full{grid-column:1/-1}
.field label{font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.field-req{color:var(--cyan-d)}
.field-err{margin-left:auto;font-size:10px;color:#DC2626;letter-spacing:.04em;font-family:var(--fd);font-weight:500}
.field input{border:2px solid var(--black);padding:13px 15px;font-size:14.5px;font-family:var(--fd);font-weight:500;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff;color:var(--black);width:100%}
.field input::placeholder{color:#9CA3AF;font-weight:400}
.field input:focus{border-color:var(--cyan);box-shadow:3px 3px 0 var(--cyan)}
.field-error input{border-color:#DC2626}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 16px;border:2px solid var(--gray-lt);background:transparent;color:#374151;font-size:13px;font-family:var(--fd);font-weight:600;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--black);color:var(--black)}
.chip.active{background:var(--black);border-color:var(--black);color:#fff}
.form-foot{margin-top:22px;padding-top:18px;border-top:2px solid var(--gray-lt);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.form-legal{font-size:12px;color:var(--gray);max-width:400px;line-height:1.5}

/* SUCCESS */
.success{padding:56px 36px;border:2px solid var(--black);box-shadow:8px 8px 0 var(--black);text-align:center;max-width:640px;margin:0 auto}
.success-icon{color:var(--cyan-d);margin-bottom:18px;display:inline-flex}
.success h2{font-size:clamp(1.8rem,3vw,2.4rem);font-weight:800;letter-spacing:-.02em;text-transform:uppercase;margin-bottom:12px}
.success p{color:var(--gray);font-size:14.5px;max-width:440px;margin:0 auto 22px;line-height:1.6}
.success-details{display:grid;gap:10px;margin:0 0 26px;padding:18px;border:2px solid var(--gray-lt);text-align:left}
.success-details div{display:grid;grid-template-columns:60px 1fr;gap:12px;font-size:13px}
.success-details span{font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);padding-top:2px}

/* WHY */
.why-list{border-top:2px solid var(--black)}
.why-row{display:grid;grid-template-columns:72px 1fr auto;gap:22px;align-items:center;padding:26px 0;border-bottom:2px solid var(--black);transition:padding .2s,background .2s;cursor:default}
.why-row:hover{padding-left:14px;padding-right:14px;background:var(--off)}
.why-num{font-family:var(--fm);font-size:13px;font-weight:600;letter-spacing:.18em;color:var(--cyan-d)}
.why-h{font-size:clamp(1.1rem,2vw,1.45rem);font-weight:700;letter-spacing:-.01em;margin-bottom:5px}
.why-p{font-size:14px;color:var(--gray);line-height:1.55}
.why-arrow{color:#9CA3AF;transition:transform .2s,color .2s;flex-shrink:0}
.why-row:hover .why-arrow{transform:translateX(6px);color:var(--black)}
@media(max-width:560px){.why-row{grid-template-columns:52px 1fr}.why-arrow{display:none}}

/* WHO */
.who-pills{display:flex;flex-wrap:wrap;gap:10px}
.who-pill{display:inline-flex;align-items:center;gap:10px;padding:13px 20px;border:2px solid var(--black);font-size:15px;font-weight:700;letter-spacing:.02em;transition:all .2s;animation:rise .5s ease both}
.who-pill:hover{background:var(--black);color:#fff}
.who-plus{color:var(--cyan-d);font-family:var(--fm);font-size:18px;line-height:1}

/* CLOSING */
.closing{background:var(--cyan);padding:clamp(60px,8vw,110px) clamp(20px,4vw,60px);text-align:center;border-top:3px solid var(--black)}
.closing h2{font-size:clamp(2.2rem,5vw,5.2rem);font-weight:800;text-transform:uppercase;letter-spacing:-.03em;line-height:.95;color:var(--black);margin-bottom:10px}
.closing h2 em{font-style:italic;font-family:"Fraunces",serif;text-transform:none;font-weight:700;display:block;font-size:.68em;line-height:1.2}
.closing p{font-size:16px;color:rgba(0,0,0,.6);margin-bottom:34px;font-weight:500}
.btn-dark{background:var(--black);color:#fff;padding:18px 38px;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:inline-flex;align-items:center;gap:12px;transition:transform .15s,box-shadow .15s;border:2px solid var(--black)}
.btn-dark:hover{transform:translateY(-3px);box-shadow:6px 6px 0 rgba(0,0,0,.3)}

/* FOOTER */
.foot{background:#fff;border-top:3px solid var(--black);padding:clamp(36px,4vw,56px) clamp(20px,4vw,60px) 24px}
.foot__inner{max-width:1300px;margin:0 auto}
.foot__top{display:flex;justify-content:space-between;align-items:flex-start;gap:28px;flex-wrap:wrap;padding-bottom:32px;border-bottom:2px solid var(--black);margin-bottom:22px}
.foot__logo img{height:48px;width:auto}
.foot__tagline{font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);margin-top:10px}
.foot__partners-lbl{font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gray);margin-bottom:10px}
.foot__partners{display:flex;gap:8px;flex-wrap:wrap}
.partner{padding:8px 14px;border:2px solid var(--black);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.foot__bottom{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--gray);font-weight:500}
.foot__links{display:flex;gap:18px}
.foot__links a:hover{color:var(--black)}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
@keyframes blink{50%{opacity:.3}}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both}
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<div id="root"></div>

function useCountdown(target) {
  const [now, setNow] = useState(() => Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  const diff = Math.max(0, target.getTime() - now);
  return {
    days: Math.floor(diff / 86400000),
    hrs:  Math.floor((diff % 86400000) / 3600000),
    mins: Math.floor((diff % 3600000)  / 60000),
    secs: Math.floor((diff % 60000)    / 1000),
  };
}

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = "Valid email required";
    if (!form.company.trim()) e.company = "Required";

          <p className="sh__sub">Space is limited. Choose how you would like to experience the event — every request is reviewed by our team.</p>
        </div>

        <div id="access" className="access-grid">
          {ACCESS.map(a => (
            <button key={a.id} type="button"
              className={"ac-card" + (access === a.id ? " active" : "")}
              onClick={() => setAccess(a.id)} aria-pressed={access === a.id}>
              <div className="ac-tag">{a.tag}</div>
              <div className="ac-label">{a.label}</div>
              <div className="ac-sub">{a.sub}</div>
              <p className="ac-body">{a.body}</p>
              <div className="ac-seats"><span className="ac-dot"/>{a.seats}</div>
            </button>
          ))}
        </div>

        <div className="form-wrap">
          <div className="form-head">
            <div>
              <div className="form-step">Step 2 of 2</div>
              <div className="form-title">Your details</div>
            </div>
            <div className="form-applying">
              Applying as <strong>{ACCESS.find(a => a.id === access)?.label}</strong>
            </div>
          </div>

          <form className="form-grid" onSubmit={submit} noValidate>
            <Field label="Full name" error={showErr("name") && errors.name} req>
              <input value={form.name} onChange={e => upd("name", e.target.value)}
                onBlur={() => blur("name")} placeholder="Jane Doe" autoComplete="name"/>
            </Field>
            <Field label="Email address" error={showErr("email") && errors.email} req>
              <input type="email" value={form.email} onChange={e => upd("email", e.target.value)}
                onBlur={() => blur("email")} placeholder="jane@company.com" autoComplete="email"/>
            </Field>
            <Field label="Company / organization" error={showErr("company") && errors.company} req>
              <input value={form.company} onChange={e => upd("company", e.target.value)}
                onBlur={() => blur("company")} placeholder="Your company" autoComplete="organization"/>
            </Field>
            <Field label="Phone number" error={showErr("phone") && errors.phone}>
              <input type="tel" value={form.phone} onChange={e => upd("phone", e.target.value)}
                onBlur={() => blur("phone")} placeholder="(555) 555-5555" autoComplete="tel"/>
            </Field>
            <Field label="What interests you most?" error={showErr("interest") && errors.interest} req full>
              <div className="chips">
                {INTERESTS.map(i => (
                  <button type="button" key={i}
                    className={"chip" + (form.interest === i ? " active" : "")}
                    onClick={() => { upd("interest", i); blur("interest"); }}>{i}</button>
                ))}
              </div>
            </Field>
            <div className="form-foot field-full">
              <div className="form-legal">By submitting you agree to receive event communications from Shark Branding Solutions. We never share your details.</div>
              <button type="submit" className="btn-primary" disabled={submitting}>
                {submitting ? "Submitting…" : "Request my invitation →"}
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>
  );
}

function Field({ label, error, req, full, children }) {
  return (
    <div className={"field" + (full ? " field-full" : "") + (error ? " field-error" : "")}>
      <label>
        {label}
        {req && <span className="field-req"> *</span>}
        {error && <span className="field-err">{error}</span>}
      </label>
      {children}
    </div>
  );
}

// ── WHY ───────────────────────────────────────────────────────────────────────
const WHY = [
  { n:"01", h:"See unreleased AI technology",       b:"Experience AI systems before public rollout — straight from the teams building them." },
  { n:"02", h:"Help shape the future",              b:"Hackers actively test and influence the development of the technology in real time." },
  { n:"03", h:"Real business use cases",            b:"Everything demonstrated is built around real-world business communication, sales, and operational efficiency." },
  { n:"04", h:"Win fun awards",                     b:"Awards are given to hackers who push the AI hardest and break it best. Come ready to compete." },
];

function Why() {
  return (
    <section className="sec sec--gray" id="why">
      <div className="wrap">
        <div className="sh">
          <div className="sh__num">02 — Why attend</div>
          <h2 className="sh__title">Four reasons this <em>isn't</em> another tech event.</h2>
        </div>
        <div className="why-list">
          {WHY.map(w => (
            <article key={w.n} className="why-row">
              <span className="why-num">{w.n}</span>
              <div>
                <div className="why-h">{w.h}</div>
                <div className="why-p">{w.b}</div>
              </div>
              <span className="why-arrow">
                <svg viewBox="0 0 24 24" width="24" height="24">
                  <path d="M4 12h14m-5-5 5 5-5 5" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>

// ── CLOSING ───────────────────────────────────────────────────────────────────
function Closing({ onCTA }) {
  return (
    <section className="closing">
      <h2>Most people will read about this AI.<br/><em>You'll be in the room with it.</em></h2>
      <p>May 26, 2026 · 12:00 PM – 2:00 PM · Zephyrhills, FL</p>
      <button className="btn-dark" onClick={onCTA}>Join the Waitlist →</button>
    </section>

// ── FOOTER ────────────────────────────────────────────────────────────────────
function Footer() {
  return (
    <footer className="foot">
      <div className="foot__inner">
        <div className="foot__top">
          <div>
            <img src={LOGO_SRC} alt="Shark Branding Solutions" style={{ height:"48px", width:"auto" }}/>
            <div className="foot__tagline">AI Visibility · Tampa Bay</div>
          </div>
          <div>
            <div className="foot__partners-lbl">Presented in partnership with</div>
            <div className="foot__partners">
              <div className="partner">Worthington Agency</div>
              <div className="partner">North Tampa Bay Chamber</div>
            </div>
          </div>
        </div>
        <div className="foot__bottom">
          <span>© 2026 Shark Branding Solutions</span>
          <div className="foot__links">
            <a href="#waitlist">Waitlist</a>
            <a href="#experience">Experience</a>
            <a href="#why">Why Attend</a>
          </div>
        </div>
      </div>

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  function scrollToWaitlist() {
    const el = document.getElementById("waitlist");
    if (el) window.scrollTo({ top: el.offsetTop - 64, behavior: "smooth" });
  }
  return (
    <>
      <Nav onCTA={scrollToWaitlist}/>
      <Hero onCTA={scrollToWaitlist}/>
      <Marquee/>
      <CountdownBar/>
      <Experience/>
      <Why/>
      <Waitlist/>
      <Closing onCTA={scrollToWaitlist}/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
